<style>
:root{--azul:#1a5fb4;--azul2:#3b82d6;--naranja:#e5622a;--verde:#2d8a4e;--fondo:#f4f6fb;--tar:#fff;--borde:#dde3f0;--txt:#1a1f36;--gris:#5a6380;--gris2:#8791a8;--radio:16px;--mono:Consolas,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:var(--fondo);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}.top{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,var(--azul),#113c76);color:white;padding:14px 16px;box-shadow:0 4px 18px #0003}.topin{max-width:820px;margin:auto;display:flex;gap:12px;align-items:center}.logo{background:#ffffff22;width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:23px}.title{font-weight:850;line-height:1.1}.sub{font-size:11px;opacity:.85;margin-top:2px}.badge{margin-left:auto;font-size:10px;font-weight:800;background:#ffffff22;border-radius:999px;padding:6px 10px;white-space:nowrap}.wrap{max-width:820px;margin:auto;padding:16px 12px}.card{background:white;border:1px solid var(--borde);border-radius:var(--radio);box-shadow:0 4px 18px rgba(26,95,180,.09);padding:16px;margin-bottom:14px}.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--gris);font-weight:850;margin:0 0 8px}.help{font-size:12.5px;color:var(--gris);line-height:1.45}.student{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}input,select,textarea,button{font-family:inherit}input,select,textarea{width:100%;border:1.5px solid var(--borde);background:#f0f3fa;border-radius:10px;padding:9px 10px;outline:none;color:var(--txt)}input:focus,select:focus,textarea:focus{border-color:var(--azul);background:white}input[type=number]{font-family:var(--mono)}textarea{min-height:60px;resize:vertical}.prog{margin-bottom:14px}.plab{display:flex;justify-content:space-between;font-size:12px;color:var(--gris);margin-bottom:7px}.bar{height:7px;background:var(--borde);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--azul),var(--azul2));transition:.3s}.dots{display:flex;gap:6px;overflow:auto;padding-top:8px}.dot{min-width:66px;height:34px;border:1.5px solid var(--borde);background:white;border-radius:10px;color:var(--gris);font-size:10px;font-weight:850;cursor:pointer}.dot.act{background:var(--azul);border-color:var(--azul);color:white}.dot.done{background:#e6f5ec;border-color:var(--verde);color:var(--verde)}.stageTop{background:linear-gradient(135deg,var(--azul),#2269bd);color:white;margin:-16px -16px 14px;padding:18px 16px;border-radius:16px 16px 0 0}.age{display:inline-block;background:#ffffff24;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:850;margin-bottom:8px}.stitle{font-size:22px;font-weight:900;line-height:1.1;margin-bottom:5px}.sdesc{font-size:13px;opacity:.9;line-height:1.45}.tip{background:#e8f0fb;border-left:4px solid var(--azul);border-radius:0 10px 10px 0;padding:10px 12px;color:var(--azul);font-size:12.5px;line-height:1.45;margin-bottom:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{background:#f7f9fd;border:1px solid var(--borde);border-radius:12px;padding:12px}.lab{font-size:12px;font-weight:800;color:var(--gris);margin-bottom:5px;display:block}.rangeRow{display:grid;grid-template-columns:1fr 120px;gap:10px;align-items:center}input[type=range]{width:100%;height:7px;appearance:none;background:var(--borde);border-radius:999px;padding:0}input[type=range]::-webkit-slider-thumb{appearance:none;width:22px;height:22px;background:var(--azul);border:3px solid white;border-radius:50%;box-shadow:0 2px 8px #1a5fb466}input[type=range]::-moz-range-thumb{width:22px;height:22px;background:var(--azul);border:3px solid white;border-radius:50%}.saving{display:flex;gap:10px;align-items:center;background:#e6f5ec;border:1px solid #bfe5cc;border-radius:12px;padding:12px;margin-top:10px}.ico{width:38px;height:38px;background:var(--verde);color:white;border-radius:12px;display:grid;place-items:center;font-size:21px}.saving span{font-size:11.5px;color:var(--gris)}.money{font-family:var(--mono);font-weight:900;color:var(--verde);font-size:18px}.sect{font-size:12.5px;text-transform:uppercase;letter-spacing:.45px;color:var(--gris);font-weight:900;margin:16px 0 8px}.alloc{background:white;border:1px solid var(--borde);border-radius:12px;padding:10px}.alloc h4{font-size:10px;color:var(--gris2);text-transform:uppercase;letter-spacing:.35px;margin:0 0 7px}.pct{font-family:var(--mono);font-size:25px;font-weight:900;margin-bottom:7px}.am{font-size:11.5px;color:var(--gris);font-family:var(--mono);margin:7px 0}.inst{display:grid;grid-template-columns:1.3fr .7fr;gap:8px;align-items:end}.fixed{background:#e8f0fb;border-color:#bcd4f1}.fixed .pct{color:var(--azul)}.results{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.res{background:white;border:1px solid var(--borde);border-radius:12px;padding:10px}.res.hl{background:#e8f0fb;border-color:#b7d2ef}.res span{display:block;font-size:10.5px;color:var(--gris);font-weight:800;margin-bottom:4px}.res strong{font-family:var(--mono);font-size:15px}.res.hl strong{color:var(--azul)}.decision{background:#fff0e8;border:1px solid #ffd5bf;border-radius:16px;padding:14px;margin-top:10px}.decision h3{font-size:14px;color:#8a3b15;margin:0 0 4px}.decision p{font-size:12.5px;color:#7b4b35;line-height:1.45}.meta{display:grid;grid-template-columns:1fr 140px;gap:8px;align-items:end;margin:8px 0}.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.strip div{background:white;border:1px solid #ffd5bf;border-radius:10px;padding:9px;text-align:center}.strip span{display:block;font-size:10px;color:#8a6b5a;font-weight:800}.strip strong{font-family:var(--mono);font-size:12px}.warn{display:none;background:#fee2e2;color:#b91c1c;font-size:11px;border-radius:8px;padding:6px 8px;margin-top:5px}.nav{display:flex;gap:8px;margin-top:16px}.btn{border:0;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer}.pri{background:var(--azul);color:white;flex:2}.secbtn{background:white;color:var(--gris);border:1.5px solid var(--borde);flex:1}.ok{background:var(--verde);color:white;width:100%}.ghost{background:transparent;border:1.5px solid var(--borde);color:var(--gris);width:100%;margin-top:8px}.hero{background:linear-gradient(135deg,var(--azul),#113c76);color:white;border-radius:16px;padding:20px 16px;text-align:center;margin-bottom:14px;box-shadow:0 4px 18px #1a5fb421}.hero span{font-size:12px;opacity:.85}.hero strong{display:block;font-family:var(--mono);font-size:34px;margin:5px 0}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}.kpi{background:white;border:1px solid var(--borde);border-radius:12px;padding:11px;text-align:center}.kpi span{display:block;font-size:10px;color:var(--gris2);text-transform:uppercase;font-weight:900;margin-bottom:5px}.kpi strong{font-family:var(--mono);font-size:13px}.chart{background:white;border:1px solid var(--borde);border-radius:16px;padding:14px;box-shadow:0 4px 18px #1a5fb414;margin-bottom:14px}.chart h3{font-size:14px;margin:0 0 10px}.svg{width:100%;height:260px;overflow:visible}.axis text{font-size:10px;fill:var(--gris);font-family:var(--mono)}.leg{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--gris);margin-top:8px}.leg i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px}.twrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th{background:var(--azul);color:white;text-align:left;padding:8px;white-space:nowrap}td{border-bottom:1px solid var(--borde);padding:8px;white-space:nowrap}tr:nth-child(even) td{background:#f4f6fb}.foot{text-align:center;font-size:11px;color:var(--gris2);line-height:1.45;padding:8px}
.guide{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:12px;margin:10px 0}.guide h4{margin:0 0 7px;color:#166534;font-size:13px}.guide p{font-size:12.5px;color:#37523f;line-height:1.45;margin:4px 0}.guidegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.guidebox{background:white;border:1px solid #bbf7d0;border-radius:10px;padding:9px}.guidebox span{display:block;font-size:10.5px;color:#54825f;font-weight:850}.guidebox strong{display:block;font-family:var(--mono);font-size:14px;margin-top:3px;color:#166534}.miniActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.miniBtn{border:1.5px solid #bbf7d0;background:white;color:#166534;border-radius:10px;padding:9px 10px;font-size:12px;font-weight:900;cursor:pointer}.miniBtn:active{transform:scale(.98)}

.miniBtn.alt{background:#fff;border:1.5px solid #ffd5bf;color:#8a3b15}.miniBtn.reset{background:#fee2e2;border:1.5px solid #fecaca;color:#991b1b}.decision-note{background:#fff7ed;border:1px dashed #fb923c;color:#7c2d12;border-radius:10px;padding:8px 10px;font-size:12px;line-height:1.45;margin:8px 0}.edit-note{font-size:11.5px;color:#7b4b35;margin-top:5px;font-weight:700}.miniActions.triple{grid-template-columns:repeat(3,1fr)}
@media(max-width:650px){.student,.grid2,.rangeRow,.meta{grid-template-columns:1fr}.grid3{grid-template-columns:1fr}.results,.strip,.kpis,.guidegrid,.miniActions{grid-template-columns:1fr}.inst{grid-template-columns:1fr}.hero strong{font-size:28px}.badge{display:none}}@media print{.top,.prog,.nav,.btn{display:none!important}body{background:white}.card,.chart{box-shadow:none;break-inside:avoid}}
.goalcard{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:10px;margin-bottom:8px}.goalcard b{color:#166534}.goalbadge{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;margin-left:4px}.muted{color:var(--gris2)}
</style>

<body>
<header class="top"><div class="topin"><div class="logo">💰</div><div><div class="title">Simulador Financiero — Mi Plan de Vida</div><div class="sub">MATERIA MAT. APLICADA A LAS FINANZAS · By MTRA. ADRIANA ARROYO G · V12</div></div><div class="badge">NMS · México</div></div></header>
<div class="wrap">
  <div class="card"><h2 class="sec">Datos del alumno</h2><p class="help">Completa tus datos y recorre cada etapa. Puedes modificar cantidades, porcentajes, instrumentos y tasas. Este simulador usa supuestos didácticos.</p><div class="student"><input id="studentName" type="text" placeholder="Nombre completo" maxlength="70"><input id="studentGroup" type="text" placeholder="Grupo / Turno" maxlength="40"></div></div>
  <div class="prog"><div class="plab"><span id="progressLabel"></span><strong id="progressPct"></strong></div><div class="bar"><div class="fill" id="progressFill"></div></div><div class="dots" id="stageDots"></div></div>
  <div id="panel"></div>
</div>
<script>
const CATALOG={"Cuenta separada / ahorro bancario":3,"BONDDIA":6,"CETES 28 días":6.3,"CETES 91–364 días":6.7,"BONDES F":6.5,"UDIBONOS":7,"Bonos M":7.5,"Inversión a plazo / pagaré":5.5,"Aportación voluntaria AFORE":7.5};
const STAGES=[
{age:'18–23 años',name:'Bachillerato y primeros pasos',months:72,desc:'El objetivo principal es crear el hábito. Ahorrar poco pero constante enseña disciplina financiera.',tip:'En esta etapa lo importante es separar dinero para emergencias y metas cercanas. Si eres menor de edad, investiga opciones de ahorro con apoyo de una persona adulta responsable.',income:3000,savePct:20,liq:42,med:33,instr:['BONDDIA','CETES 91–364 días','UDIBONOS'],rates:[6,6.7,7],meta:'Laptop, inscripción universitaria, curso, certificación o emergencia escolar',goalAmt:5000,moveAmt:0,reflection:'¿Qué meta financiera elegiste en esta etapa y por qué te pareció importante?'},
{age:'24–26 años',name:'Primer empleo formal',months:36,desc:'El ingreso ya es más estable. Aumenta el ahorro sin subir todos los gastos al mismo ritmo.',tip:'Con tu primer empleo formal puedes construir un fondo de emergencia adulto y empezar a invertir con más constancia.',income:18000,savePct:25,liq:18,med:44,instr:['BONDDIA','CETES 91–364 días','Aportación voluntaria AFORE'],rates:[6,6.7,7.5],meta:'Auto usado, mudanza, herramientas de trabajo, diplomado o independizarse',goalAmt:30000,moveAmt:10000,reflection:'¿Qué cambió en tu capital cuando aumentaste el ingreso y el porcentaje de ahorro?'},
{age:'27–34 años',name:'Mayor rango y mejor salario',months:96,desc:'Mayor estabilidad. Es momento de balancear metas de mediano plazo y reforzar el largo plazo.',tip:'El interés compuesto empieza a notarse. Mover capital a largo plazo desde joven puede impactar mucho el patrimonio futuro.',income:28000,savePct:25,liq:16,med:40,instr:['BONDDIA','CETES 91–364 días','Bonos M'],rates:[6,6.7,7.5],meta:'Enganche de auto nuevo, maestría, emprendimiento o viaje importante',goalAmt:80000,moveAmt:25000,reflection:'¿Por qué crees que mover una parte del capital a largo plazo puede hacer diferencia?'},
{age:'35–44 años',name:'Estabilidad profesional y familiar',months:120,desc:'Puede haber más responsabilidades: pareja, hijos, vivienda o salud. El ahorro debe ser más intencional.',tip:'Aquí conviene proteger a la familia y no descuidar el retiro. Un buen plan separa emergencias, metas y patrimonio.',income:40000,savePct:20,liq:13,med:37,instr:['BONDDIA','BONDES F','Bonos M'],rates:[6,6.5,7.5],meta:'Enganche de casa, educación de hijos, seguro, emergencia médica o viaje familiar',goalAmt:120000,moveAmt:50000,reflection:'¿Cómo cambian tus metas financieras cuando piensas en familia, vivienda o salud?'},
{age:'45–54 años',name:'Crecimiento del patrimonio',months:120,desc:'El capital acumulado ya trabaja para ti. Proteger el poder adquisitivo es tan importante como buscar rendimiento.',tip:'En esta etapa puede ser útil revisar instrumentos que ayuden a conservar valor en el tiempo y mantener liquidez para emergencias.',income:55000,savePct:22,liq:10,med:30,instr:['BONDDIA','UDIBONOS','Bonos M'],rates:[6,7,7.5],meta:'Universidad de hijos, XV años, viaje familiar, fondo médico o liquidar deuda',goalAmt:150000,moveAmt:100000,reflection:'¿Qué decisión financiera tendría mayor impacto: gastar, guardar o reinvertir? Explica.'},
{age:'55–65 años',name:'Pre-retiro y administración',months:120,desc:'Último tramo laboral. Consolida el fondo de retiro y conserva liquidez para la transición.',tip:'Antes del retiro conviene revisar cuánto necesitarás al mes y mantener un equilibrio entre seguridad, liquidez y crecimiento.',income:65000,savePct:30,liq:10,med:20,instr:['BONDDIA','UDIBONOS','Aportación voluntaria AFORE'],rates:[6,7,7.5],meta:'Salud, mantenimiento del hogar, apoyo familiar, vivienda definitiva o retiro digno',goalAmt:200000,moveAmt:150000,reflection:'¿Qué acciones tomarías para llegar al retiro con mayor tranquilidad financiera?'}];
let current=0,state=STAGES.map(s=>({income:s.income,savePct:s.savePct,liq:s.liq,med:s.med,instr:[...s.instr],rates:[...s.rates],meta:s.meta,goalAmt:s.goalAmt,moveAmt:s.moveAmt,reflection:'',done:false}));
function clamp(n,min,max){n=Number(n);if(isNaN(n))n=0;return Math.max(min,Math.min(max,n))}function longPct(i){return Math.max(0,100-state[i].liq-state[i].med)}function m(n,full=false){n=Math.round(Number(n)||0);let s=n<0?'-':'';n=Math.abs(n);if(full)return s+'$'+n.toLocaleString('es-MX')+' MXN';if(n>=1e6)return s+'$'+(n/1e6).toFixed(n>=1e7?1:2)+' M MXN';if(n>=1000)return s+'$'+Math.round(n/1000).toLocaleString('es-MX')+' mil MXN';return s+'$'+n.toLocaleString('es-MX')+' MXN'}function ci(dep,rate,init,mo){let r=(Number(rate)||0)/100/12;if(mo<=0)return init;if(Math.abs(r)<1e-12)return init+dep*mo;return init*Math.pow(1+r,mo)+dep*(Math.pow(1+r,mo)-1)/r}
function decide(L,M,G,goal,move){let total=L+M+G,availableNoLong=L+M,used=Math.min(Math.max(0,goal),total),rem=used,uL=Math.min(L,rem);L-=uL;rem-=uL;let uM=Math.min(M,rem);M-=uM;rem-=uM;let uG=Math.min(G,rem);G-=uG;let avail=L+M,moved=Math.min(Math.max(0,move),avail),mv=moved,mL=Math.min(L,mv);L-=mL;mv-=mL;let mM=Math.min(M,mv);M-=mM;G+=moved;return{used,moved,liq:L,med:M,largo:G,final:L+M+G,cappedGoal:goal>total,cappedMove:move>avail,availableNoLong,availAfterGoal:avail,touchedLong:uG>0,usedLong:uG}}
function calcAll(){let start={liq:0,med:0,largo:0},rows=[],totalAportado=0;for(let i=0;i<STAGES.length;i++){let s=STAGES[i],d=state[i],lp=longPct(i),monthly=d.income*d.savePct/100,depL=monthly*d.liq/100,depM=monthly*d.med/100,depG=monthly*lp/100,L=ci(depL,d.rates[0],start.liq,s.months),M=ci(depM,d.rates[1],start.med,s.months),G=ci(depG,d.rates[2],start.largo,s.months),before=L+M+G,contribution=monthly*s.months;totalAportado+=contribution;let dec=decide(L,M,G,d.goalAmt,d.moveAmt),interest=before-(start.liq+start.med+start.largo)-contribution;rows.push({i,start:{...start},monthly,depL,depM,depG,closeLiq:L,closeMed:M,closeLargo:G,before,contribution,interest,longPct:lp,...dec});start={liq:dec.liq,med:dec.med,largo:dec.largo}}let totalUsado=rows.reduce((a,r)=>a+r.used,0),finalTotal=rows[rows.length-1].final,intereses=Math.max(0,finalTotal+totalUsado-totalAportado);return{rows,final:{...start},totalAportado,totalUsado,finalTotal,intereses}}
function esc(x){return String(x||'').replace(/[&<>"']/g,a=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[a]))}function opts(sel){return Object.keys(CATALOG).map(k=>`<option value="${k}" ${k===sel?'selected':''}>${k}</option>`).join('')}
function progress(){let done=state.filter(s=>s.done).length,p=Math.round(done/STAGES.length*100);document.getElementById('progressLabel').textContent=current<6?`Etapa ${current+1} de ${STAGES.length}`:'Resumen final';document.getElementById('progressPct').textContent=p+'% completado';document.getElementById('progressFill').style.width=p+'%';document.getElementById('stageDots').innerHTML=STAGES.map((s,i)=>`<button class="dot ${i===current?'act':state[i].done?'done':''}" onclick="go(${i})">${s.age.replace(' años','')}</button>`).join('')+`<button class="dot ${current===6?'act':''}" onclick="go(6)">📊 Resumen</button>`}
function go(i){current=i;render();scrollTo(0,0)}function render(){progress();if(current===6)return summary();let s=STAGES[current],d=state[current],all=calcAll(),r=all.rows[current];if(d.moveAmt>Math.round(r.availAfterGoal)){d.moveAmt=Math.round(r.availAfterGoal);all=calcAll();r=all.rows[current]}let lp=longPct(current),safeMeta=r.availableNoLong,autoMove=r.availAfterGoal;document.getElementById('panel').innerHTML=`<div class="card"><div class="stageTop"><div class="age">${s.age}</div><div class="stitle">${s.name}</div><div class="sdesc">${s.desc}</div></div><div class="tip">💡 <b>Idea clave:</b> ${s.tip}</div><div class="sect">1. Personaliza tu ingreso y ahorro</div><div class="grid2"><div class="box"><label class="lab">Ingreso mensual</label><div class="rangeRow"><input type="range" min="500" max="120000" step="500" value="${d.income}" oninput="setRange('income',this.value)"><input type="number" min="0" step="100" value="${Math.round(d.income)}" onfocus="this.select()" onchange="setNum('income',this.value)"></div><p class="help">Mueve la barra o escribe una cantidad exacta.</p></div><div class="box"><label class="lab">Porcentaje de ahorro</label><div class="rangeRow"><input type="range" min="1" max="60" step="1" value="${d.savePct}" oninput="setRange('savePct',this.value)"><input type="number" min="0" max="100" step="1" value="${Math.round(d.savePct)}" onfocus="this.select()" onchange="setNum('savePct',this.value)"></div><p class="help">Ahorro mensual: <b>${m(r.monthly,true)}</b></p></div></div><div class="saving"><div class="ico">📌</div><div><span>Con estos datos, apartarías cada mes:</span><div class="money">${m(r.monthly,true)}</div></div></div><div class="sect">2. Reparte tu ahorro mensual</div><p class="help">Edita liquidez y mediano plazo. Largo plazo se completa automáticamente para que siempre sumen 100%.</p><div class="grid3" style="margin-top:8px"><div class="alloc"><h4>Liquidez / emergencia</h4><div class="pct">${Math.round(d.liq)}%</div><input type="range" min="0" max="100" step="1" value="${Math.round(d.liq)}" oninput="setAlloc('liq',this.value)"><input type="number" min="0" max="100" step="1" value="${Math.round(d.liq)}" onfocus="this.select()" onchange="setAlloc('liq',this.value)" style="margin-top:8px"><div class="am">${m(r.depL,true)}/mes</div><div class="inst"><div><label class="lab">Instrumento</label><select onchange="setInstr(0,this.value)">${opts(d.instr[0])}</select></div><div><label class="lab">Tasa anual</label><input type="number" step=".1" value="${d.rates[0]}" onfocus="this.select()" onchange="setRate(0,this.value)"></div></div></div><div class="alloc"><h4>Mediano plazo</h4><div class="pct">${Math.round(d.med)}%</div><input type="range" min="0" max="100" step="1" value="${Math.round(d.med)}" oninput="setAlloc('med',this.value)"><input type="number" min="0" max="100" step="1" value="${Math.round(d.med)}" onfocus="this.select()" onchange="setAlloc('med',this.value)" style="margin-top:8px"><div class="am">${m(r.depM,true)}/mes</div><div class="inst"><div><label class="lab">Instrumento</label><select onchange="setInstr(1,this.value)">${opts(d.instr[1])}</select></div><div><label class="lab">Tasa anual</label><input type="number" step=".1" value="${d.rates[1]}" onfocus="this.select()" onchange="setRate(1,this.value)"></div></div></div><div class="alloc fixed"><h4>Largo plazo / patrimonio</h4><div class="pct">${Math.round(lp)}%</div><p class="help">Se calcula automáticamente.</p><div class="am">${m(r.depG,true)}/mes</div><div class="inst"><div><label class="lab">Instrumento</label><select onchange="setInstr(2,this.value)">${opts(d.instr[2])}</select></div><div><label class="lab">Tasa anual</label><input type="number" step=".1" value="${d.rates[2]}" onfocus="this.select()" onchange="setRate(2,this.value)"></div></div></div></div><div class="sect">3. Capital antes de tomar decisiones</div><div class="results"><div class="res hl"><span>Total acumulado</span><strong>${m(r.before)}</strong></div><div class="res"><span>Liquidez</span><strong>${m(r.closeLiq)}</strong></div><div class="res"><span>Mediano plazo</span><strong>${m(r.closeMed)}</strong></div><div class="res"><span>Largo plazo</span><strong>${m(r.closeLargo)}</strong></div></div><div class="decision"><h3>4. Puente entre etapas: ¿qué harás con el capital?</h3><p>Primero puedes usar una parte para una meta real de tu etapa. Después puedes mover dinero de liquidez/mediano plazo a largo plazo. El simulador no crea dinero extra: solo cambia su destino.</p><div class="guide"><h4>✅ Guía automática para no hacer cuentas</h4><p><b>Puedes usar hasta ${m(safeMeta,true)}</b> para una meta sin tocar lo que ya está en largo plazo. Con el monto que escribiste para tu meta, todavía quedan <b>${m(autoMove,true)}</b> disponibles para mover a largo plazo.</p><div class="decision-note">Estos botones solo afectan la etapa actual. <b>Usar meta y monto sugeridos</b> coloca la meta ejemplo de esta etapa y su monto sugerido. Si te equivocas, escribe otro monto o usa <b>Restablecer decisión</b>. Al pasar a la siguiente etapa, el simulador arrastra solo el capital que quedó disponible.</div><div class="guidegrid"><div class="guidebox"><span>Máximo para meta sin tocar largo plazo</span><strong>${m(safeMeta,true)}</strong></div><div class="guidebox"><span>Disponible para mover a largo plazo</span><strong>${m(autoMove,true)}</strong></div></div><div class="miniActions triple"><button class="miniBtn alt" onclick="noGoal()">No usar meta</button><button class="miniBtn" onclick="useSuggestedGoal()">Usar meta y monto sugeridos</button><button class="miniBtn" onclick="useSafeGoal()">Usar máximo seguro</button></div><div class="miniActions triple" style="margin-top:6px"><button class="miniBtn alt" onclick="noMove()">No mover a largo plazo</button><button class="miniBtn" onclick="moveAvailable()">Mover disponible</button><button class="miniBtn reset" onclick="resetDecision()">Restablecer decisión</button></div></div><div class="meta"><div><label class="lab">¿En qué usaste tu dinero? / Meta lograda</label><input type="text" value="${esc(d.meta)}" onchange="setMeta(this.value)" onfocus="this.select()"><p class="help">Escribe la meta real o una meta posible: laptop, universidad, auto, casa, viaje, salud, XV años, etc. Aparecerá en tu informe final.</p></div><div><label class="lab">Monto para meta</label><input type="number" min="0" step="500" value="${Math.round(d.goalAmt)}" onfocus="this.select()" onchange="setNum('goalAmt',this.value)"><p class="help">Sugerencia: no excedas ${m(safeMeta,true)} si quieres cuidar el largo plazo.</p></div></div><div class="warn" style="display:${r.cappedGoal?'block':'none'}">⚠️ El monto de la meta supera tu capital acumulado. Se usará solo lo disponible.</div><div class="warn" style="display:${r.touchedLong?'block':'none'}">⚠️ Para cubrir esta meta se tocaría una parte del largo plazo. Considera bajar la meta o usar solo el máximo seguro.</div><div class="meta"><div><label class="lab">Mover a largo plazo</label><p class="help">El simulador ya calculó cuánto queda disponible después de tu meta. Puedes escribir un monto o usar el botón de arriba para mover todo lo disponible.</p></div><div><label class="lab">Monto a mover</label><input type="number" min="0" step="500" value="${Math.round(d.moveAmt)}" onfocus="this.select()" onchange="setNum('moveAmt',this.value)"><p class="help">Disponible ahora: ${m(autoMove,true)}</p></div></div><div class="warn" style="display:${r.cappedMove?'block':'none'}">⚠️ No se puede mover más de lo que queda fuera de largo plazo. Se moverá solo lo disponible.</div><div class="strip"><div><span>Capital antes</span><strong>${m(r.before)}</strong></div><div><span>Usado en meta</span><strong>${m(r.used)}</strong></div><div><span>Movido a largo</span><strong>${m(r.moved)}</strong></div><div><span>Capital siguiente</span><strong>${m(r.final)}</strong></div></div></div><div class="sect">5. Reflexiona</div><div class="box"><label class="lab">${s.reflection}</label><textarea placeholder="Escribe aquí tu respuesta..." oninput="state[current].reflection=this.value">${esc(d.reflection)}</textarea></div><div class="nav">${current>0?'<button class="btn secbtn" onclick="prev()">← Anterior</button>':''}<button class="btn pri" onclick="next()">${current<5?'Guardar y seguir →':'Guardar y ver resumen →'}</button></div></div>`}
function capMoveForCurrent(){let r=calcAll().rows[current];state[current].moveAmt=Math.min(Math.max(0,state[current].moveAmt),Math.round(r.availAfterGoal))}
function setRange(k,v){state[current][k]=k==='savePct'?clamp(v,0,100):clamp(v,0,200000);if(k==='income'||k==='savePct')capMoveForCurrent();render()}function setNum(k,v){let max=k==='savePct'?100:k==='goalAmt'||k==='moveAmt'?999999999:200000;state[current][k]=clamp(v,0,max);if(k==='goalAmt')capMoveForCurrent();render()}function draftNum(k,v){let max=k==='goalAmt'||k==='moveAmt'?999999999:200000;state[current][k]=clamp(v,0,max)}function setAlloc(w,v){v=clamp(v,0,100);let d=state[current];if(w==='liq'){d.liq=v;if(d.liq+d.med>100)d.med=100-d.liq}else{d.med=v;if(d.liq+d.med>100)d.liq=100-d.med}capMoveForCurrent();render()}function setInstr(pos,val){state[current].instr[pos]=val;if(CATALOG[val]!=null)state[current].rates[pos]=CATALOG[val];render()}function setRate(pos,v){state[current].rates[pos]=clamp(v,-20,50);render()}function setMeta(v){state[current].meta=String(v||'Meta personal');render()}function noGoal(){state[current].goalAmt=0;capMoveForCurrent();render()}function useSuggestedGoal(){let r=calcAll().rows[current];state[current].meta=STAGES[current].meta;state[current].goalAmt=Math.min(STAGES[current].goalAmt,Math.round(r.before));capMoveForCurrent();render()}function useSafeGoal(){let r=calcAll().rows[current];state[current].goalAmt=Math.round(r.availableNoLong);state[current].moveAmt=0;render()}function noMove(){state[current].moveAmt=0;render()}function moveAvailable(){let r=calcAll().rows[current];state[current].moveAmt=Math.round(r.availAfterGoal);render()}function resetDecision(){state[current].goalAmt=STAGES[current].goalAmt;state[current].moveAmt=STAGES[current].moveAmt;state[current].meta=STAGES[current].meta;capMoveForCurrent();render()}function next(){capMoveForCurrent();state[current].done=true;current=Math.min(current+1,6);render();scrollTo(0,0)}function prev(){current=Math.max(current-1,0);render();scrollTo(0,0)}
function svgLine(rows){let W=720,H=260,ml=74,mr=16,mt=20,mb=48,max=Math.max(1,...rows.map(r=>r.final)),x=i=>ml+(W-ml-mr)*(i/(rows.length-1)),y=v=>mt+(H-mt-mb)*(1-v/max),pts=rows.map((r,i)=>`${x(i)},${y(r.final)}`).join(' '),grid=[0,.25,.5,.75,1].map(t=>{let val=max*t,yy=y(val);return`<line x1="${ml}" y1="${yy}" x2="${W-mr}" y2="${yy}" stroke="#dde3f0"/><text x="${ml-8}" y="${yy+4}" text-anchor="end">${m(val).replace(' MXN','')}</text>`}).join(''),labs=rows.map((r,i)=>`<text x="${x(i)}" y="${H-22}" text-anchor="middle">${STAGES[i].age.replace(' años','')}</text>`).join(''),dots=rows.map((r,i)=>`<circle cx="${x(i)}" cy="${y(r.final)}" r="5" fill="#1a5fb4"/><text x="${x(i)}" y="${y(r.final)-10}" text-anchor="middle" style="font-size:10px;font-weight:800;fill:#1a1f36">${m(r.final).replace(' MXN','')}</text>`).join('');return`<svg class="svg" viewBox="0 0 ${W} ${H}"><g class="axis">${grid}<line x1="${ml}" y1="${H-mb}" x2="${W-mr}" y2="${H-mb}" stroke="#8791a8"/>${labs}</g><polyline points="${pts}" fill="none" stroke="#1a5fb4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`}
function stack(rows){let max=Math.max(1,...rows.map(r=>r.final));return rows.map((r,i)=>`<div style="display:grid;grid-template-columns:78px 1fr 92px;gap:8px;align-items:center;margin-bottom:8px"><div style="font-size:11px;color:var(--gris);font-weight:850">${STAGES[i].age.replace(' años','')}</div><div style="height:22px;background:#f0f3fa;border-radius:5px;overflow:hidden;display:flex"><div style="width:${r.liq/max*100}%;background:#a8ccef"></div><div style="width:${r.med/max*100}%;background:#3b82d6"></div><div style="width:${r.largo/max*100}%;background:#123e78"></div></div><div style="font-size:11px;font-family:var(--mono);font-weight:850;text-align:right">${m(r.final).replace(' MXN','')}</div></div>`).join('')}
function summary(){let all=calcAll(),rows=all.rows,n=document.getElementById('studentName').value||'Alumno/a',g=document.getElementById('studentGroup').value||'',goals=rows.map((r,i)=>({i,r,meta:state[i].meta||STAGES[i].meta})).filter(x=>x.r.used>0);document.getElementById('panel').innerHTML=`<div class="hero"><span>${esc(n)}${g?' · '+esc(g):''}</span><strong>${m(all.finalTotal)}</strong><span>Patrimonio estimado al cierre del recorrido con tus decisiones</span></div><div class="kpis"><div class="kpi"><span>Total aportado</span><strong>${m(all.totalAportado)}</strong></div><div class="kpi"><span>Intereses aprox.</span><strong style="color:var(--verde)">${m(all.intereses)}</strong></div><div class="kpi"><span>Usado en metas</span><strong style="color:var(--naranja)">${m(all.totalUsado)}</strong></div><div class="kpi"><span>Metas logradas</span><strong>${goals.length}</strong></div></div><div class="chart"><h3>🏁 Metas logradas sin deudas</h3><p class="help">Estas son las metas que decidiste financiar con tu propio capital acumulado. El simulador las muestra como logros porque no se resolvieron con deuda dentro de esta práctica.</p>${goals.length?goals.map(x=>`<div class="goalcard"><b>${STAGES[x.i].age} · ${esc(x.meta)}</b><span class="goalbadge">${m(x.r.used,true)}</span><p class="help" style="margin:.35rem 0 0">Etapa: ${STAGES[x.i].name}. Después de esta meta, tu capital continuó hacia la siguiente etapa.</p></div>`).join(''):'<p class="help">No registraste uso de capital para metas. Puedes volver a cada etapa, escribir una meta y asignar un monto.</p>'}</div><div class="chart"><h3>📈 Crecimiento del patrimonio por etapa</h3>${svgLine(rows)}<p class="help">La gráfica muestra el capital que queda después de usar dinero en metas y mover parte a largo plazo.</p></div><div class="chart"><h3>🧩 Composición del capital</h3>${stack(rows)}<div class="leg"><span><i style="background:#a8ccef"></i>Liquidez</span><span><i style="background:#3b82d6"></i>Mediano plazo</span><span><i style="background:#123e78"></i>Largo plazo</span></div></div><div class="chart"><h3>📋 Resumen por etapa</h3><div class="twrap"><table><thead><tr><th>Edad</th><th>Etapa</th><th>Ingreso</th><th>Ahorro mensual</th><th>Capital antes</th><th>Meta lograda / uso</th><th>Monto usado</th><th>Movido a largo</th><th>Capital siguiente</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${STAGES[i].age}</td><td>${STAGES[i].name}</td><td>${m(state[i].income,true)}</td><td>${m(r.monthly,true)}</td><td>${m(r.before,true)}</td><td>${r.used>0?esc(state[i].meta||STAGES[i].meta):'<span class="muted">Sin uso de meta</span>'}</td><td>${m(r.used,true)}</td><td>${m(r.moved,true)}</td><td>${m(r.final,true)}</td></tr>`).join('')}</tbody></table></div></div><div class="chart"><h3>📝 Reflexiones registradas</h3>${STAGES.map((s,i)=>state[i].reflection?`<div class="box" style="margin-bottom:8px"><b style="font-size:12px;color:var(--azul)">${s.name}</b><p class="help" style="color:var(--txt);margin:.3rem 0 0">${esc(state[i].reflection)}</p></div>`:'').join('')||'<p class="help">Todavía no registraste reflexiones. Puedes volver a cada etapa y escribirlas.</p>'}</div><div class="card"><h2 class="sec">Exportar evidencia</h2><p class="help">Abre la ventana de impresión. En computadora o celular puedes elegir “Guardar como PDF”.</p><button class="btn ok" onclick="exportPrint()">🖨️ Imprimir o guardar como PDF</button><button class="btn ghost" onclick="if(confirm('¿Reiniciar el simulador? Se borrarán los datos de esta sesión.'))location.reload()">🔄 Empezar de nuevo</button></div><div class="foot">Modelo didáctico · MATERIA MAT. APLICADA A LAS FINANZAS · By MTRA. ADRIANA ARROYO G · V12 · Las tasas son simuladas y no sustituyen asesoría financiera profesional.</div><div class="nav"><button class="btn secbtn" onclick="go(5)">← Volver a etapa 6</button></div>`}
function exportPrint(){let all=calcAll(),rows=all.rows,n=document.getElementById('studentName').value||'Alumno/a',g=document.getElementById('studentGroup').value||'',goals=rows.map((r,i)=>({i,r,meta:state[i].meta||STAGES[i].meta})).filter(x=>x.r.used>0),goalHtml=goals.length?`<h2>Metas logradas sin deudas</h2><table><thead><tr><th>Edad</th><th>Meta lograda</th><th>Monto usado</th><th>Etapa</th></tr></thead><tbody>${goals.map(x=>`<tr><td>${STAGES[x.i].age}</td><td>${esc(x.meta)}</td><td>${m(x.r.used,true)}</td><td>${STAGES[x.i].name}</td></tr>`).join('')}</tbody></table>`:'',ref=STAGES.map((s,i)=>state[i].reflection?`<p><b>${s.name}:</b> ${esc(state[i].reflection)}</p>`:'').join(''),w=open('','_blank');w.document.write(`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Plan financiero</title><style>body{font-family:Arial,sans-serif;color:#1a1f36;padding:22px;font-size:12px}h1{color:#1a5fb4;font-size:20px;margin:0 0 4px}h2{font-size:14px;color:#1a5fb4;margin:18px 0 8px}.meta{color:#5a6380;margin-bottom:16px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}.kpi{background:#f0f3fa;border-radius:8px;padding:10px;text-align:center}.kpi span{display:block;font-size:10px;color:#5a6380;text-transform:uppercase}.kpi b{font-size:14px}table{width:100%;border-collapse:collapse;margin-top:10px}th{background:#1a5fb4;color:white;padding:7px;text-align:left;font-size:11px}td{border-bottom:1px solid #dde3f0;padding:7px}tr:nth-child(even)td{background:#f4f6fb}.foot{margin-top:18px;border-top:1px solid #ddd;padding-top:8px;color:#777;font-size:10px}</style></head><body><h1>Plan Financiero Personal — Simulador de Etapas de Vida</h1><div class="meta">Alumno/a: <b>${esc(n)}</b>${g?' · Grupo: <b>'+esc(g)+'</b>':''} · Fecha: ${new Date().toLocaleDateString('es-MX')}</div><div class="kpis"><div class="kpi"><span>Patrimonio final</span><b>${m(all.finalTotal)}</b></div><div class="kpi"><span>Total aportado</span><b>${m(all.totalAportado)}</b></div><div class="kpi"><span>Intereses</span><b>${m(all.intereses)}</b></div><div class="kpi"><span>Metas logradas</span><b>${goals.length}</b></div></div>${goalHtml}<h2>Resumen por etapa</h2><table><thead><tr><th>Edad</th><th>Etapa</th><th>Ingreso</th><th>Ahorro mensual</th><th>Capital antes</th><th>Meta lograda / uso</th><th>Monto usado</th><th>Movido a largo</th><th>Capital siguiente</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${STAGES[i].age}</td><td>${STAGES[i].name}</td><td>${m(state[i].income,true)}</td><td>${m(r.monthly,true)}</td><td>${m(r.before,true)}</td><td>${r.used>0?esc(state[i].meta||STAGES[i].meta):'Sin uso de meta'}</td><td>${m(r.used,true)}</td><td>${m(r.moved,true)}</td><td>${m(r.final,true)}</td></tr>`).join('')}</tbody></table>${ref?'<h2>Reflexiones</h2>'+ref:''}<div class="foot">Modelo didáctico · MATERIA MAT. APLICADA A LAS FINANZAS · By MTRA. ADRIANA ARROYO G · V12 · Las tasas son simuladas y no sustituyen asesoría financiera profesional.</div><script>window.onload=function(){window.print()}<\/script></body></html>`);w.document.close()}
